services:
  mysql:
    image: mysql:8.0
    container_name: scut-wms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scut_wms
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - scut-wms-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  scut-wms-mysql-data:
